<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pedra papel e tesoura</title>
</head>
<body>
    <header class="introducao">
        <img src="./images/logogame.png" alt="logo">
        <div class="placar">
            <h2 class="score">Pontos</h2>
            <p class="pontuacao">0</p>
        </div>
    </header>
    <main class="jogo">
        <img src="./images/hexagono.png" alt="" class="hexagono">
        <!--Papel-->
        <div class="conteiner conteiner-papel" onclick="jogar(papel)">
            <button value="papel" class="papel opcao"><img src="./images/icon-paper.svg" alt="papel"></button>
        </div>
        <!--Tesoura-->
        <div class="conteiner conteiner-tesoura" onclick="jogar(tesoura)">
            <button value="tesoura" class="tesoura opcao"><img src="./images/icon-scissors.svg" alt="tesoura"></button>
        </div>
        <!--Pedra-->
        <div class="conteiner conteiner-pedra" onclick="jogar(pedra)">
            <button value="pedra" class="pedra opcao"><img src="./images/icon-rock.svg" alt="pedra"></button>
        </div>
        <!-- Lagarto -->
        <div class="conteiner conteiner-lagarto" onclick="jogar(lagarto)">
            <button value="lagarto" class="lagarto opcao"><img src="./images/lagarto.png" alt="lagarto"></button>
        </div>
        <!-- Spock -->
        <div class="conteiner conteiner-spock" onclick="jogar(spock)">
            <button value="spock" class="spock opcao"><img src="./images/spock.png" alt="spock"></button>
        </div>
    </main>
    <!--Regras-->
    <div id="regra" class="regras">
        <div class="regras-titulo">
            <h1>Regras</h1>
            <button onclick="fecharRegras()"><img src="./images/icon-close.svg" alt="fechar"></button>
        </div>
        <img src="./images/regras.png" alt="regras">
    </div>
    <!--Gameplay-->
    <div class="gameplay">
        <div class="player display">
            <h2 class="persona">Você Escolheu</h2>
            <p class="test"></p>
        </div>
        <div class="fim">
            <p class="result"></p>
            <button class="playAgain" onclick="reset()">Jogar Novamente</button>
        </div>
        <div class="house display">
            <h2 class="persona">O Computador Escolheu</h2>
            <p class="test1"></p>
        </div>
    </div>
    <button class="regras-button" onclick="mostrarRegras()">Regras</button>
    <script src="script.js"></script>
</body>
</html>
